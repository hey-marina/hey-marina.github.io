<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina's Space</title>
    <style>
        /* 全局样式重置与背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* 个人卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* 头像（这里用文字代替，你可以以后换成图片） */
        .avatar {
            width: 100px;
            height: 100px;
            background: #8ec5fc;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* 名字 */
        h1 {
            margin: 10px 0;
            font-size: 28px;
            color: #2c3e50;
        }

        /* 简介 */
        p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 按钮链接 */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #6c5ce7;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #5b4bc4;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.6);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar">🌊</div>
        
        <h1>Hi, 我是 Marina</h1>
        <p>欢迎来到我的个人秘密基地！这是我用 GitHub Pages 搭建的第一个网站。未来我打算在这里分享我的生活、想法和有趣的项目。</p>
        
        <a href="#" class="btn">探索更多</a>
    </div>

</body>
</html>
